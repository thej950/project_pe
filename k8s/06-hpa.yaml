apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: employee-api-hpa
  namespace: employee-ns

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: employee-api-deployment

  minReplicas: 2
  maxReplicas: 5

  metrics:
  - type: Resource

    resource:
      name: cpu

      target:
        type: Utilization
        averageUtilization: 50
